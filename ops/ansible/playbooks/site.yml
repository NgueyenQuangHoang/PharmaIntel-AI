
- name: Setup PharmaIntel Web Server
  hosts: webservers
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: Show target server info
      ansible.builtin.debug:
        msg:
          - "🎯 Target: {{ inventory_hostname }} ({{ ansible_host }})"
          - "📦 Project: {{ project_name }}"
          - "🌍 Environment: {{ environment_name }}"

  roles:
    - role: common
      tags: [common]

    - role: docker
      tags: [docker]

    - role: nginx
      tags: [nginx]

    - role: deploy
      tags: [deploy]

  post_tasks:
    - name: Final status
      ansible.builtin.debug:
        msg:
          - "✅ Server da san sang!"
          - "🌐 Web URL: http://{{ ansible_host }}:{{ app_port if ansible_host == 'localhost' else '80' }}"
          - "📋 Services: docker, nginx"
