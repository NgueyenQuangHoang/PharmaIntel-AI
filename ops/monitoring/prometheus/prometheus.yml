global:
  scrape_interval: 15s          # Scrape moi 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus tu scrape chinh no
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter - metrics host (CPU, RAM, disk, network)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor - metrics Docker containers
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # SQL Server metrics
  - job_name: 'mssql'
    static_configs:
      - targets: ['mssql-exporter:4000']
