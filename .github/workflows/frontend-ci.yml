# =============================================================================
# Frontend CI - PharmaIntel AI web (React + Vite + TS)
# Trigger:
#   - push/PR vao master khi co thay doi trong client/** hoac chinh workflow nay
# Cac buoc:
#   1. npm ci (cache theo package-lock.json)
#   2. ESLint
#   3. Vite build (xac nhan tsc + bundle pass)
#   4. Build Docker image de xac nhan Dockerfile van work (khong push)
# =============================================================================
name: Frontend CI

on:
  push:
    branches: [master]
    paths:
      - "client/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "client/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  build:
    name: Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # Build CI dung URL placeholder. Image deploy that su build lai voi URL prod.
          VITE_API_URL: http://localhost:5292/api
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/
          retention-days: 3

  docker:
    name: Verify Docker build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: pharmaintel-web:ci-${{ github.sha }}
          build-args: |
            VITE_API_URL=http://localhost:5292/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
