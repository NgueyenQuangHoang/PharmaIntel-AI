# =============================================================================
# Backend CI - PharmaIntel.API (.NET 10)
# Trigger:
#   - push/PR vao master khi co thay doi trong server/** hoac chinh workflow nay
# Cac buoc:
#   1. Restore + build Release
#   2. Test (neu co test project; hien tai chua co - bo qua mem)
#   3. Build Docker image de xac nhan Dockerfile van work (khong push)
# =============================================================================
name: Backend CI

on:
  push:
    branches: [master]
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  build:
    name: Restore + Build + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('server/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore PharmaIntel.API/PharmaIntel.API.csproj

      - name: Build (Release)
        run: dotnet build PharmaIntel.API/PharmaIntel.API.csproj --configuration Release --no-restore

      - name: Test
        # Hien tai chua co test project. Khi them, dat o server/**/*.Tests.csproj
        # va step nay tu chay. `--no-build` de dung lai output da build o tren.
        run: |
          if compgen -G "**/*.Tests.csproj" > /dev/null; then
            dotnet test --configuration Release --no-build --verbosity normal --logger "trx" --results-directory ./TestResults
          else
            echo "Khong tim thay test project - bo qua."
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: server/TestResults/
          if-no-files-found: ignore
          retention-days: 7

  docker:
    name: Verify Docker build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: pharmaintel-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
