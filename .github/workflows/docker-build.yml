# =============================================================================
# Docker build & push - PharmaIntel AI
# Build va push image cho api + web len GitHub Container Registry (GHCR).
# Chay sau khi backend-ci & frontend-ci pass.
#
# Trigger:
#   - push vao master                    -> tag :latest + :sha-<7>
#   - push tag v*.*.* (vi du v1.2.3)      -> tag :1.2.3, :1.2, :1, :latest
#   - workflow_dispatch                   -> chay tay
#
# Yeu cau:
#   - Repository setting > Actions > Workflow permissions: "Read and write" (cho push GHCR)
#   - (Tuy chon) Secret VITE_API_URL_PROD : URL API public cho web build
# =============================================================================
name: Docker build & push

on:
  workflow_run:
    workflows: ["Backend CI", "Frontend CI"]
    types: [completed]
    branches: [master]
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      vite_api_url:
        description: "VITE_API_URL cho frontend build (de trong = dung secret/default)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository_owner }}/pharmaintel-api
  IMAGE_WEB: ${{ github.repository_owner }}/pharmaintel-web

jobs:
  # Guard: chi build khi CI da pass
  check:
    name: Check CI passed
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI da pass, tien hanh build & push image"
  api:
    name: Build & push API image
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_API }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=PharmaIntel API
            org.opencontainers.image.description=Backend API cho PharmaIntel AI

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  web:
    name: Build & push web image
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=PharmaIntel Web
            org.opencontainers.image.description=Frontend React cho PharmaIntel AI

      - name: Resolve VITE_API_URL
        id: vite
        run: |
          # Uu tien: input workflow_dispatch -> secret -> mac dinh placeholder
          URL="${{ inputs.vite_api_url }}"
          if [ -z "$URL" ]; then
            URL="${{ secrets.VITE_API_URL_PROD }}"
          fi
          if [ -z "$URL" ]; then
            URL="http://localhost:5292/api"
            echo "::warning::VITE_API_URL_PROD chua duoc dat - dung mac dinh '$URL'. Frontend deploy se goi sai API."
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ steps.vite.outputs.url }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
