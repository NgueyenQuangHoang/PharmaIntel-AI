# =============================================================================
# nginx.conf - serve SPA React + Vite build output.
# Dac diem:
#   - Listen 8080 (non-privileged)
#   - Gzip cho asset text
#   - Cache lau cho asset hashed cua Vite (/assets/*)
#   - Cache ngan cho index.html (de deploy moi an ngay)
#   - SPA fallback: moi route khong match file -> tra index.html
#   - Reverse proxy sang container `api` (mang noi bo compose) cho:
#       /api/...    REST API
#       /hubs/...   SignalR (WebSocket, can Upgrade)
#       /uploads/...file tinh BE tra (anh don thuoc, ...)
#     Nho the frontend dung VITE_API_URL=/api (cung origin) -> het phu thuoc
#     localhost va het CORS.
# =============================================================================

# Map de ho tro WebSocket upgrade (SignalR). Connection: upgrade khi co Upgrade
# header, nguoc lai giu close de khong lam hong request thuong.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       8080;
    listen  [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Bao mat co ban
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options         "DENY"   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_vary on;

    # Asset Vite (file co content hash) -> cache 1 nam, immutable
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # File static khac (favicon, robots, ...) - cache vua phai
    location ~* \.(?:ico|png|jpg|jpeg|gif|webp|svg|woff2?)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # index.html khong cache - de user nhan ban deploy moi
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
    }

    # --- Reverse proxy sang API container ---
    # `api` la ten service trong docker-compose, resolve qua DNS noi bo cua mang
    # compose. proxy_pass KHONG co URI o cuoi -> giu nguyen path goc (/api/..).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR hub - can HTTP/1.1 + Upgrade header cho WebSocket.
    location /hubs/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # File tinh BE tra ve (vd /uploads/prescriptions/...).
    location /uploads/ {
        proxy_pass http://api:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: route phia client (react-router) -> tra index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tat banner phien ban nginx
    server_tokens off;
}
