# =============================================================================
# nginx.conf - serve SPA React + Vite build output.
# Dac diem:
#   - Listen 8080 (non-privileged)
#   - Gzip cho asset text
#   - Cache lau cho asset hashed cua Vite (/assets/*)
#   - Cache ngan cho index.html (de deploy moi an ngay)
#   - SPA fallback: moi route khong match file -> tra index.html
# =============================================================================

server {
    listen       8080;
    listen  [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Bao mat co ban
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options         "DENY"   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_vary on;

    # Asset Vite (file co content hash) -> cache 1 nam, immutable
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # File static khac (favicon, robots, ...) - cache vua phai
    location ~* \.(?:ico|png|jpg|jpeg|gif|webp|svg|woff2?)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # index.html khong cache - de user nhan ban deploy moi
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
    }

    # SPA fallback: route phia client (react-router) -> tra index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tat banner phien ban nginx
    server_tokens off;
}
